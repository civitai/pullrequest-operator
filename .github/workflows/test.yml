name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.19'
      - run: go build ./...
      # pkg/... only — controllers/suite_test.go needs envtest (KUBEBUILDER_ASSETS)
      - run: go test ./pkg/... -v
      # controllers: only the pure helper test (no envtest needed); the ginkgo
      # TestAPIs suite is left to envtest and excluded here.
      - run: go test ./controllers/... -run TestNextSourceBranches -v
