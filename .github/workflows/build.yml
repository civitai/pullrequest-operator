name: build-push
on:
  push:
    branches: [feat/label-retrigger, main, master]
    tags: ['v*']
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/civitai/pullrequest-operator
          # Tag pushes (e.g. v0.1.8-labels.3) -> that tag; branch/sha for dev builds.
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
